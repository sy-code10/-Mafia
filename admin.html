<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>MASTER PANEL - NARATOR</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #000; color: #00ff00; padding: 20px; }
        .card { border: 1px solid #00ff00; padding: 15px; margin-bottom: 20px; border-radius: 5px; background: #111; }
        #monitor-chat { height: 300px; background: #050505; border: 1px solid #333; overflow-y: auto; padding: 10px; margin-bottom: 10px; color: #00ff00; font-size: 13px; }
        button { padding: 10px; margin: 5px; cursor: pointer; font-weight: bold; border-radius: 4px; border: none; width: 100%; }
        .btn-siang { background: #f1c40f; color: black; }
        .btn-malam { background: #2980b9; color: white; }
        .btn-reset { background: #c0392b; color: white; margin-top: 20px; }
        input { width: 95%; padding: 10px; background: #222; border: 1px solid #444; color: #00ff00; margin-bottom: 10px; }
        .msg-line { margin-bottom: 5px; border-bottom: 1px solid #111; }
    </style>
</head>
<body>
    <h1>SYSTEM LOGS: NARATOR ONLY</h1>

    <div class="card">
        <h3>1. MONITOR CHAT (INTIP PESAN)</h3>
        <div id="monitor-chat">
            <div>Menunggu pesan masuk...</div>
        </div>
    </div>

    <div class="card">
        <h3>2. KONTROL GAME</h3>
        <button class="btn-siang" onclick="updateStatus('SIANG HARI', 'Silakan berdiskusi!')">AKTIFKAN SIANG</button>
        <button class="btn-malam" onclick="updateStatus('MALAM HARI', 'Mata tertutup! Mafia beraksi.')">AKTIFKAN MALAM</button>
        <hr>
        <input type="text" id="inp-info" placeholder="Ketik pengumuman manual...">
        <button style="background: #27ae60; color: white;" onclick="kirimManual()">UPDATE STATUS</button>
    </div>

    <div class="card">
        <button class="btn-reset" onclick="resetSemua()">WIPE DATA (RESET TOTAL)</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getDatabase, ref, set, remove, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAme9eEMI10CqbZwSW164De7l9aKRLjIKQ",
            authDomain: "mafia-game-21d71.firebaseapp.com",
            databaseURL: "https://mafia-game-21d71-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "mafia-game-21d71"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- MONITOR CHAT REALTIME ---
        const monitorBox = document.getElementById('monitor-chat');
        onChildAdded(query(ref(db, 'chat'), limitToLast(50)), (snap) => {
            const d = snap.val();
            const div = document.createElement('div');
            div.className = "msg-line";
            div.innerHTML = `> [${d.pengirim}]: ${d.teks}`;
            monitorBox.appendChild(div);
            monitorBox.scrollTop = monitorBox.scrollHeight;
        });

        // --- FUNGSI ADMIN ---
        window.updateStatus = (stat, info) => {
            set(ref(db, 'status_game'), stat);
            set(ref(db, 'pengumuman'), info);
        };

        window.kirimManual = () => {
            const val = document.getElementById('inp-info').value;
            if(val) set(ref(db, 'pengumuman'), val);
            document.getElementById('inp-info').value = "";
        };

        window.resetSemua = () => {
            if(confirm("Hapus semua data ronde ini?")) {
                remove(ref(db, 'chat'));
                remove(ref(db, 'daftar_pemain'));
                set(ref(db, 'status_game'), "MULAI");
                set(ref(db, 'pengumuman'), "Game baru dimulai!");
                set(ref(db, 'pemain_mati'), "-");
                location.reload();
            }
        };
    </script>
</body>
</html>
